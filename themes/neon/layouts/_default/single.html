{{ define "main" }}
<article class="story">
  <header class="story-header">
    {{ if .Params.section_label }}<span class="section-label">{{ .Params.section_label }}</span>{{ end }}
    <h1>{{ .Title }}</h1>
    {{ if .Params.summary }}<p class="story-summary">{{ .Params.summary }}</p>{{ end }}
  </header>

  <div class="story-body">
    {{ .Content }}
  </div>

  <div class="story-footer">
    <a href="{{ .Parent.Permalink }}" class="back-link">← Back</a>
  </div>

  <section class="feedback">
    <p class="feedback-prompt">Something wrong? Something surprising? <a href="mailto:neonpulse314@gmail.com?subject=Re: {{ .Title | urlquery }}">Write to us.</a></p>
  </section>
</article>
{{ end }}
